<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LeafleKT Map</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/assets/leaflet/leaflet.css" />
    <style>
        html,
        body {
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        #map {
            position: fixed;
            inset: 0;
        }
    </style>
</head>
<body>
<div id="map"></div>
<script src="/assets/leaflet/leaflet.js"></script>
<script src="/assets/leaflet/india-boundaries.js"></script>
<script>
    (function () {
        const DEFAULT_LAT = 22.5726;
        const DEFAULT_LNG = 88.3639;
        const DEFAULT_ZOOM = 12;
        const bridgeName = "LeafletAndroidBridge";
        const defaultMapStyle = {
            id: "open_street_map",
            tileUrlTemplate: "https://tile.openstreetmap.org/{z}/{x}/{y}.png",
            attributionHtml: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            maxZoom: 19,
            subdomains: null
        };

        let map = null;
        let activeTileLayer = null;
        let activeZoomControl = null;
        let activeMapStyle = defaultMapStyle;
        let isIndiaBoundaryOverlayVisible = true;
        let isZoomControlEnabled = true;
        const markers = [];

        function getAndroidBridge() {
            return window[bridgeName];
        }

        function notifyMapReady() {
            const androidBridge = getAndroidBridge();
            if (androidBridge && typeof androidBridge.onMapReady === "function") {
                androidBridge.onMapReady();
            }
        }

        function notifyMapClick(lat, lng) {
            const androidBridge = getAndroidBridge();
            if (androidBridge && typeof androidBridge.onMapClick === "function") {
                androidBridge.onMapClick(lat, lng);
            }
        }

        function notifyMarkerClick(markerId) {
            const androidBridge = getAndroidBridge();
            if (androidBridge && typeof androidBridge.onMarkerClick === "function") {
                androidBridge.onMarkerClick(markerId);
            }
        }

        function showLoadError(message) {
            const mapContainer = document.getElementById("map");
            mapContainer.innerHTML = "<div style='padding:16px;font-family:sans-serif;color:#b00020'>" + message + "</div>";
        }

        function createMap(lat, lng, zoom) {
            map = L.map("map", { zoomControl: false }).setView([lat, lng], zoom);
            applyZoomControls();
            replaceTileLayer(activeMapStyle);

            map.on("click", function (event) {
                notifyMapClick(event.latlng.lat, event.latlng.lng);
            });

            applyIndiaBoundaryOverlayVisibility();
            retryInvalidateSize(20);

            notifyMapReady();
            return map;
        }

        function applyZoomControls() {
            if (map === null) {
                return;
            }

            if (isZoomControlEnabled && activeZoomControl === null) {
                activeZoomControl = L.control.zoom();
                activeZoomControl.addTo(map);
                return;
            }

            if (!isZoomControlEnabled && activeZoomControl !== null) {
                map.removeControl(activeZoomControl);
                activeZoomControl = null;
            }
        }

        function retryInvalidateSize(remainingAttempts) {
            if (map === null) {
                return;
            }

            map.invalidateSize();

            if (remainingAttempts <= 0) {
                return;
            }

            setTimeout(function () {
                retryInvalidateSize(remainingAttempts - 1);
            }, 150);
        }

        function ensureMap(lat, lng, zoom) {
            if (map !== null) {
                return map;
            }
            return createMap(lat, lng, zoom);
        }

        function createTileLayer(style) {
            const tileLayerOptions = {
                maxZoom: style.maxZoom,
                attribution: style.attributionHtml
            };

            if (style.subdomains) {
                tileLayerOptions.subdomains = style.subdomains;
            }

            return L.tileLayer(style.tileUrlTemplate, tileLayerOptions);
        }

        function replaceTileLayer(style) {
            activeMapStyle = style;

            if (map === null) {
                return;
            }

            if (activeTileLayer !== null) {
                map.removeLayer(activeTileLayer);
            }

            activeTileLayer = createTileLayer(style);
            activeTileLayer.addTo(map);
        }

        function applyIndiaBoundaryOverlayVisibility() {
            if (map === null || typeof window.LeafleKTIndiaBoundaryOverlay === "undefined") {
                return;
            }

            window.LeafleKTIndiaBoundaryOverlay.setVisible(map, isIndiaBoundaryOverlayVisible);
        }

        function nextMarkerId() {
            return "marker-" + Date.now() + "-" + Math.floor(Math.random() * 100000);
        }

        function addMarkerLayer(marker) {
            const activeMap = ensureMap(DEFAULT_LAT, DEFAULT_LNG, DEFAULT_ZOOM);
            const markerId = marker.id || nextMarkerId();
            const markerLayer = L.marker([marker.lat, marker.lng]).addTo(activeMap);

            if (marker.title) {
                markerLayer.bindPopup(marker.title);
            }

            markerLayer.on("click", function () {
                notifyMarkerClick(markerId);
            });

            markers.push(markerLayer);
            return markerId;
        }

        window.LeafletBridge = {
            initMap: function (lat, lng, zoom) {
                ensureMap(lat, lng, zoom);
            },
            setZoomControlsEnabled: function (isEnabled) {
                isZoomControlEnabled = Boolean(isEnabled);
                applyZoomControls();
            },
            setMapStyle: function (style) {
                if (!style || !style.tileUrlTemplate || !style.attributionHtml) {
                    return;
                }

                replaceTileLayer({
                    id: style.id || defaultMapStyle.id,
                    tileUrlTemplate: style.tileUrlTemplate,
                    attributionHtml: style.attributionHtml,
                    maxZoom: Number(style.maxZoom || defaultMapStyle.maxZoom),
                    subdomains: style.subdomains || null
                });
            },
            setIndiaBoundaryOverlayVisible: function (isVisible) {
                isIndiaBoundaryOverlayVisible = Boolean(isVisible);
                applyIndiaBoundaryOverlayVisibility();
            },
            addMarker: function (lat, lng, title) {
                addMarkerLayer({ lat: lat, lng: lng, title: title || null });
            },
            addMarkers: function (list) {
                if (!Array.isArray(list) || list.length === 0) {
                    return;
                }

                ensureMap(list[0].lat, list[0].lng, DEFAULT_ZOOM);
                list.forEach(function (item) {
                    addMarkerLayer({
                        id: item.id || null,
                        lat: Number(item.lat),
                        lng: Number(item.lng),
                        title: item.title || null
                    });
                });
            },
            moveCamera: function (lat, lng, zoom) {
                const activeMap = ensureMap(lat, lng, zoom);
                activeMap.setView([lat, lng], zoom);
            },
            clearMarkers: function () {
                if (map === null) {
                    return;
                }
                markers.forEach(function (markerLayer) {
                    map.removeLayer(markerLayer);
                });
                markers.length = 0;
            }
        };

        if (typeof L === "undefined") {
            showLoadError("Leaflet local assets failed to load.");
            return;
        }

        window.addEventListener("resize", function () {
            if (map !== null) {
                map.invalidateSize();
            }
        });

        ensureMap(DEFAULT_LAT, DEFAULT_LNG, DEFAULT_ZOOM);
    })();
</script>
</body>
</html>
