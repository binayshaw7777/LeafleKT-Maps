name: Release Master

on:
  push:
    branches:
      - master

permissions:
  contents: write

concurrency:
  group: release-master
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Read Version
        id: version
        shell: bash
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update README Version
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          sed -i "s/com.github.binayshaw7777.LeafleKT:leaflekt:[0-9]\+\.[0-9]\+\.[0-9]\+/com.github.binayshaw7777.LeafleKT:leaflekt:$VERSION/g" README.md
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "docs: Update README version to $VERSION [skip ci]"
          git push origin master

      - name: Check Existing Tag
        id: tag
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.value }}"
          if git rev-parse "$TAG" >/dev/null 2>&1 || git ls-remote --exit-code --tags origin "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify Release Build
        if: steps.tag.outputs.exists == 'false'
        run: ./gradlew :leaflekt:testDebugUnitTest :leaflekt:assembleRelease :leaflekt:publishReleasePublicationToMavenLocal :app:assembleDebug

      - name: Generate Documentation (Dokka)
        if: steps.tag.outputs.exists == 'false'
        run: ./gradlew :leaflekt:dokkaHtml

      - name: Deploy Documentation to GitHub Pages
        if: steps.tag.outputs.exists == 'false'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: leaflekt/build/dokka/html
          branch: gh-pages

      - name: Create GitHub Release
        id: github_release
        if: steps.tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.value }}
          name: ${{ steps.version.outputs.value }}
          target_commitish: master
          generate_release_notes: true
          files: |
            leaflekt/build/outputs/aar/leaflekt-release.aar

      - name: Warm JitPack Build
        if: steps.tag.outputs.exists == 'false'
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.value }}"
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          curl --fail --location --silent --show-error \
            "https://jitpack.io/com/github/${REPO_OWNER}/${REPO_NAME}/${TAG}/build.log" || true
